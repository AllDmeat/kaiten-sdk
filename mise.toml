[settings]
experimental = true
lockfile = true

[tools]
node = "latest"
"npm:playwright" = "latest"
# Swift is intentionally NOT managed by mise. Its core:swift backend does not
# persist per-platform download URLs in mise.lock, so `mise install` hard-fails
# under locked enforcement (lockfile = true) on a cache miss on Linux.
# See https://github.com/jdx/mise/discussions/10572
# Swift is installed in CI via SwiftyLab/setup-swift (Linux); macOS uses the
# Xcode toolchain.

[tasks.kaiten-docs-install-browsers]
description = "Install Playwright Chromium browser binaries"
run = '''
export NODE_PATH="$(mise where npm:playwright)/lib/node_modules"
playwright install chromium
'''
