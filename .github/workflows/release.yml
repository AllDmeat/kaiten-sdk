name: Release
on:
  push:
    tags:
      - "*.*.*"

env:
  PRODUCT_NAME: kaiten

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-26
            name: macOS ARM64
            archive-suffix: darwin_arm64
            bin-name: kaiten
            static-swift-stdlib: false
          - os: ubuntu-latest
            name: Linux x86_64
            archive-suffix: linux_x86_64
            bin-name: kaiten
            static-swift-stdlib: true
          - os: ubuntu-24.04-arm
            name: Linux ARM64
            archive-suffix: linux_arm64
            bin-name: kaiten
            static-swift-stdlib: true
          - os: windows-latest
            name: Windows x86_64
            archive-suffix: windows_x86_64
            bin-name: kaiten.exe
            static-swift-stdlib: false
            swift-build-arch: amd64
          - os: windows-11-arm
            name: Windows ARM64
            archive-suffix: windows_arm64
            bin-name: kaiten.exe
            static-swift-stdlib: false
            swift-build-arch: arm64
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Get Swift version
        if: runner.os == 'Windows'
        id: swift-version
        shell: bash
        run: |
          VERSION=$(grep -A3 '\[\[tools.swift\]\]' mise.lock | grep 'version' | sed 's/.*version = "\(.*\)".*/\1/')
          echo "branch=swift-${VERSION}-release" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}-RELEASE" >> "$GITHUB_OUTPUT"

      - name: Install Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@v0.3.0
        with:
          branch: ${{ steps.swift-version.outputs.branch }}
          tag: ${{ steps.swift-version.outputs.tag }}
          build_arch: ${{ matrix.swift-build-arch }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Cache SPM
        id: cache-spm
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-${{ matrix.os }}-spm-${{ hashFiles('mise.lock') }}-${{ hashFiles('Package.resolved') }}

      - name: Resolve package dependencies
        if: steps.cache-spm.outputs.cache-hit != 'true'
        run: swift package resolve

      - name: Fix swift-openapi-generator symlinks (Windows)
        if: runner.os == 'Windows' && steps.cache-spm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $checkout = Get-ChildItem ".build/checkouts" -Filter "swift-openapi-generator*" | Select-Object -First 1
          if (-not $checkout) { Write-Error "swift-openapi-generator checkout not found"; exit 1 }
          $sharedSrc = Join-Path $checkout.FullName "Plugins/PluginsShared"
          foreach ($plugin in @("OpenAPIGenerator", "OpenAPIGeneratorCommand")) {
            $symlinkPath = Join-Path $checkout.FullName "Plugins/$plugin/PluginsShared"
            if (Test-Path $symlinkPath -PathType Leaf) {
              Write-Host "Replacing symlink: $symlinkPath"
              Remove-Item $symlinkPath
              Copy-Item $sharedSrc $symlinkPath -Recurse
            }
          }

      - name: Build release binary
        id: build
        shell: bash
        run: |
          STATIC_FLAG=""
          if [ "${{ matrix.static-swift-stdlib }}" = "true" ]; then
            STATIC_FLAG="--static-swift-stdlib"
          fi
          swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG
          BIN_PATH="$(swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG --show-bin-path)"
          echo "bin-path=$BIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Bundle Swift runtime DLLs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binPath = "${{ steps.build.outputs.bin-path }}"
          Remove-Item "$binPath\*.dll" -ErrorAction SilentlyContinue
          $swiftBin = Split-Path (Get-Command swift.exe).Source
          Write-Host "Copying Swift DLLs from $swiftBin"
          Get-ChildItem "$swiftBin\*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination $binPath
            Write-Host "  Copied: $($_.Name)"
          }

      - name: Package binary
        id: package
        shell: bash
        run: |
          ARCHIVE_NAME="${PRODUCT_NAME}_${GITHUB_REF_NAME}_${{ matrix.archive-suffix }}.tar.gz"
          BIN_PATH="${{ steps.build.outputs.bin-path }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ARCHIVE_ABS="$(pwd)/${ARCHIVE_NAME}"
            (cd "$BIN_PATH" && tar -czf "$ARCHIVE_ABS" "${{ matrix.bin-name }}" *.dll)
          else
            tar -czf "${ARCHIVE_NAME}" -C "${BIN_PATH}" "${{ matrix.bin-name }}"
          fi
          echo "archive-name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive-suffix }}
          path: ${{ steps.package.outputs.archive-name }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*.tar.gz
