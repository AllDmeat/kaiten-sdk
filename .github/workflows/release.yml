name: Release
on:
  push:
    tags:
      - "*.*.*"

env:
  PRODUCT_NAME: kaiten

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-26
            name: macOS ARM64
            archive-suffix: darwin_arm64
            bin-name: kaiten
            static-swift-stdlib: false
          - os: ubuntu-latest
            name: Linux x86_64
            archive-suffix: linux_x86_64
            bin-name: kaiten
            static-swift-stdlib: true
          - os: ubuntu-24.04-arm
            name: Linux ARM64
            archive-suffix: linux_arm64
            bin-name: kaiten
            static-swift-stdlib: true
          - os: windows-latest
            name: Windows x86_64
            archive-suffix: windows_x86_64
            bin-name: kaiten.exe
            static-swift-stdlib: false
          - os: windows-11-arm
            name: Windows ARM64
            archive-suffix: windows_arm64
            bin-name: kaiten.exe
            static-swift-stdlib: false
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Install Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@v0.3.0

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Build release binary
        id: build
        shell: bash
        run: |
          STATIC_FLAG=""
          if [ "${{ matrix.static-swift-stdlib }}" = "true" ]; then
            STATIC_FLAG="--static-swift-stdlib"
          fi
          swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG
          echo "bin-path=$(swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG --show-bin-path)" >> $GITHUB_OUTPUT

      - name: Package binary
        id: package
        shell: bash
        run: |
          ARCHIVE_NAME="${PRODUCT_NAME}_${GITHUB_REF_NAME}_${{ matrix.archive-suffix }}.tar.gz"
          tar -czf "${ARCHIVE_NAME}" -C "${{ steps.build.outputs.bin-path }}" "${{ matrix.bin-name }}"
          echo "archive-name=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive-suffix }}
          path: ${{ steps.package.outputs.archive-name }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            **/*.tar.gz
