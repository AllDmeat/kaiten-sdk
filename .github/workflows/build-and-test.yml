name: Build and Test
on:
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  PRODUCT_NAME: kaiten
jobs:
  build-and-test:
    name: ${{ matrix.name }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-26
            bin-name: kaiten
            archive-suffix: darwin_arm64
            static-swift-stdlib: false
          - name: Linux x86_64
            os: ubuntu-latest
            bin-name: kaiten
            archive-suffix: linux_x86_64
            static-swift-stdlib: true
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            bin-name: kaiten
            archive-suffix: linux_arm64
            static-swift-stdlib: true
          - name: Windows x86_64
            os: windows-latest
            bin-name: kaiten.exe
            archive-suffix: windows_x86_64
            static-swift-stdlib: false
            swift-build-arch: amd64
          - name: Windows ARM64
            os: windows-11-arm
            bin-name: kaiten.exe
            archive-suffix: windows_arm64
            static-swift-stdlib: false
            swift-build-arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v3
      - name: Get Swift version
        if: runner.os == 'Windows'
        id: swift-version
        run: |
          VERSION=$(grep -A3 '\[\[tools.swift\]\]' mise.lock | grep 'version' | sed 's/.*version = "\(.*\)".*/\1/')
          echo "branch=swift-${VERSION}-release" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}-RELEASE" >> "$GITHUB_OUTPUT"
      - name: Install Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@v0.3.0
        with:
          branch: ${{ steps.swift-version.outputs.branch }}
          tag: ${{ steps.swift-version.outputs.tag }}
          build_arch: ${{ matrix.swift-build-arch }}
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev
      - name: Restore SPM cache
        id: cache-spm
        uses: actions/cache/restore@v5
        with:
          path: .build/checkouts
          key: spm-${{ runner.os }}-${{ matrix.os }}-${{ hashFiles('mise.lock') }}-${{ hashFiles('Package.resolved') }}
      - name: Resolve package dependencies
        if: steps.cache-spm.outputs.cache-hit != 'true'
        run: swift package resolve
      - name: Fix swift-openapi-generator symlinks (Windows)
        if: runner.os == 'Windows' && steps.cache-spm.outputs.cache-hit != 'true'
        run: |
          checkout=$(find .build/checkouts -maxdepth 1 -name "swift-openapi-generator*" -type d | head -1)
          if [ -z "$checkout" ]; then echo "error: swift-openapi-generator checkout not found"; exit 1; fi
          shared_src="$checkout/Plugins/PluginsShared"
          for plugin in OpenAPIGenerator OpenAPIGeneratorCommand; do
            symlink_path="$checkout/Plugins/$plugin/PluginsShared"
            if [ -f "$symlink_path" ]; then
              echo "Replacing symlink: $symlink_path"
              rm "$symlink_path"
              cp -r "$shared_src" "$symlink_path"
            fi
          done
      - name: Save SPM cache
        if: steps.cache-spm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .build/checkouts
          key: ${{ steps.cache-spm.outputs.cache-primary-key }}
      - name: Test
        run: swift test
      - name: Build release binary
        id: build
        run: |
          STATIC_FLAG=""
          if [ "${{ matrix.static-swift-stdlib }}" = "true" ]; then
            STATIC_FLAG="--static-swift-stdlib"
          fi
          BIN_PATH="$(swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG --show-bin-path)"
          swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG
          echo "bin-path=$BIN_PATH" >> "$GITHUB_OUTPUT"
      - name: Bundle Swift runtime DLLs (Windows)
        if: runner.os == 'Windows'
        run: |
          # Windows binaries dynamically link against Swift runtime DLLs.
          # --static-swift-stdlib is not supported on Windows, so we bundle
          # the DLLs alongside the binary so end users don't need Swift installed.
          BIN_PATH="${{ steps.build.outputs.bin-path }}"
          SWIFT_BIN="$(dirname "$(which swift)")"
          echo "Copying Swift DLLs from $SWIFT_BIN"
          for dll in "$SWIFT_BIN"/*.dll; do
            echo "  Copying: $(basename "$dll")"
            cp "$dll" "$BIN_PATH/"
          done
      - name: Package binary
        id: package
        run: |
          ARCHIVE_NAME="${PRODUCT_NAME}_pr${{ github.event.pull_request.number }}_${{ matrix.archive-suffix }}.tar.gz"
          BIN_PATH="${{ steps.build.outputs.bin-path }}"
          if [ "$RUNNER_OS" = "Windows" ]; then
            ARCHIVE_ABS="$(pwd)/${ARCHIVE_NAME}"
            (cd "$BIN_PATH" && tar -czf "$ARCHIVE_ABS" "${{ matrix.bin-name }}" *.dll)
          else
            tar -czf "${ARCHIVE_NAME}" -C "${BIN_PATH}" "${{ matrix.bin-name }}"
          fi
          echo "archive-name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive-suffix }}
          path: ${{ steps.package.outputs.archive-name }}
          retention-days: 7
