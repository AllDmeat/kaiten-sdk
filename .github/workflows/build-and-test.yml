name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-26
            bin-name: kaiten
          - name: Linux x86_64
            os: ubuntu-latest
            bin-name: kaiten
          - name: Windows x86_64
            os: windows-latest
            bin-name: kaiten.exe
            swift-build-arch: amd64
          - name: Windows ARM64
            os: windows-11-arm
            bin-name: kaiten.exe
            swift-build-arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Get Swift version
        if: runner.os == 'Windows'
        id: swift-version
        shell: bash
        run: |
          VERSION=$(grep -A3 '\[\[tools.swift\]\]' mise.lock | grep 'version' | sed 's/.*version = "\(.*\)".*/\1/')
          echo "branch=swift-${VERSION}-release" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION}-RELEASE" >> "$GITHUB_OUTPUT"

      - name: Install Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@v0.3.0
        with:
          branch: ${{ steps.swift-version.outputs.branch }}
          tag: ${{ steps.swift-version.outputs.tag }}
          build_arch: ${{ matrix.swift-build-arch }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Restore SPM cache
        id: cache-spm
        uses: actions/cache/restore@v5
        with:
          path: .build/checkouts
          key: spm-${{ runner.os }}-${{ matrix.os }}-${{ hashFiles('mise.lock') }}-${{ hashFiles('Package.resolved') }}

      - name: Resolve package dependencies
        if: steps.cache-spm.outputs.cache-hit != 'true'
        run: swift package resolve

      - name: Save SPM cache
        if: steps.cache-spm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .build/checkouts
          key: spm-${{ runner.os }}-${{ matrix.os }}-${{ hashFiles('mise.lock') }}-${{ hashFiles('Package.resolved') }}

      - name: Fix swift-openapi-generator symlinks (Windows)
        if: runner.os == 'Windows' && steps.cache-spm.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $checkout = Get-ChildItem ".build/checkouts" -Filter "swift-openapi-generator*" | Select-Object -First 1
          if (-not $checkout) { Write-Error "swift-openapi-generator checkout not found"; exit 1 }
          $sharedSrc = Join-Path $checkout.FullName "Plugins/PluginsShared"
          foreach ($plugin in @("OpenAPIGenerator", "OpenAPIGeneratorCommand")) {
            $symlinkPath = Join-Path $checkout.FullName "Plugins/$plugin/PluginsShared"
            if (Test-Path $symlinkPath -PathType Leaf) {
              Write-Host "Replacing symlink: $symlinkPath"
              Remove-Item $symlinkPath
              Copy-Item $sharedSrc $symlinkPath -Recurse
            }
          }

      - name: Build
        id: build
        shell: bash
        run: |
          swift build
          BIN_PATH="$(swift build --show-bin-path)"
          echo "bin-path=$BIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: kaiten-${{ matrix.name }}
          path: ${{ steps.build.outputs.bin-path }}/${{ matrix.bin-name }}
          retention-days: 1
