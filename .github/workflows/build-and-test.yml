name: Build and Test

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PRODUCT_NAME: kaiten
  # Swift toolchain version. Swift is installed outside of mise (see the
  # "Install Swift (Linux)" step below) because mise's core:swift backend does
  # not persist per-platform download URLs in mise.lock, so `mise install`
  # hard-fails under locked enforcement on a Linux cache miss.
  # See https://github.com/jdx/mise/discussions/10572
  SWIFT_VERSION: 6.2.3

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-26
            bin-name: kaiten
            archive-suffix: darwin_arm64
            static-swift-stdlib: false
          - name: Linux x86_64
            os: ubuntu-latest
            bin-name: kaiten
            archive-suffix: linux_x86_64
            static-swift-stdlib: true
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            bin-name: kaiten
            archive-suffix: linux_arm64
            static-swift-stdlib: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Swift (Linux)
        if: runner.os == 'Linux'
        # Swift is installed outside of mise: mise's core:swift backend does not
        # persist per-platform download URLs in mise.lock, so `mise install`
        # hard-fails under locked enforcement on a Linux cache miss.
        # See https://github.com/jdx/mise/discussions/10572
        # SwiftyLab/setup-swift supports Linux x86_64 and ARM64.
        uses: SwiftyLab/setup-swift@v1
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Install mise
        uses: jdx/mise-action@v4
        # mise manages node + playwright (used by the kaiten-docs task), not Swift.
        # Swift is installed outside of mise — see the steps above and
        # https://github.com/jdx/mise/discussions/10572 for why.

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Restore SPM cache
        id: cache-spm
        uses: actions/cache/restore@v5
        with:
          # Cache only .build/checkouts (dependency sources, not compiled artifacts).
          # Saved immediately after resolve so that build outputs never end up in cache.
          # Key includes mise.lock so the cache is invalidated when the Swift version changes.
          path: .build/checkouts
          key: spm-${{ runner.os }}-${{ matrix.os }}-${{ hashFiles('mise.lock') }}-${{ hashFiles('Package.resolved') }}

      - name: Resolve package dependencies
        if: steps.cache-spm.outputs.cache-hit != 'true'
        run: swift package resolve

      - name: Save SPM cache
        if: steps.cache-spm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .build/checkouts
          key: ${{ steps.cache-spm.outputs.cache-primary-key }}

      - name: Test
        run: swift test

      - name: Build release binary
        id: build
        run: |
          STATIC_FLAG=""
          if [ "${{ matrix.static-swift-stdlib }}" = "true" ]; then
            STATIC_FLAG="--static-swift-stdlib"
          fi
          # --show-bin-path is called first (no compilation, just prints the path)
          # to avoid invoking swift build twice.
          BIN_PATH="$(swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG --show-bin-path)"
          swift build -c release --product "$PRODUCT_NAME" $STATIC_FLAG
          echo "bin-path=$BIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Package binary
        id: package
        run: |
          ARCHIVE_NAME="${PRODUCT_NAME}_pr${{ github.event.pull_request.number }}_${{ matrix.archive-suffix }}.tar.gz"
          BIN_PATH="${{ steps.build.outputs.bin-path }}"
          tar -czf "${ARCHIVE_NAME}" -C "${BIN_PATH}" "${{ matrix.bin-name }}"
          echo "archive-name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive-suffix }}
          path: ${{ steps.package.outputs.archive-name }}
          retention-days: 7
