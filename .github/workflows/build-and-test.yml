name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS ARM64
            os: macos-26
            bin-name: kaiten
          - name: Linux x86_64
            os: ubuntu-latest
            bin-name: kaiten
          - name: Windows x86_64
            os: windows-latest
            bin-name: kaiten.exe
            swift-build-arch: amd64
          - name: Windows ARM64
            os: windows-11-arm
            bin-name: kaiten.exe
            swift-build-arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3

      - name: Install Swift (Windows)
        if: runner.os == 'Windows'
        uses: compnerd/gha-setup-swift@v0.3.0
        with:
          branch: swift-6.2.3-release
          tag: 6.2.3-RELEASE
          build_arch: ${{ matrix.swift-build-arch }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Cache SPM
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}

      - name: Fix swift-openapi-generator symlinks (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          swift package resolve
          $checkout = Get-ChildItem ".build/checkouts" -Filter "swift-openapi-generator*" | Select-Object -First 1
          if (-not $checkout) { Write-Error "swift-openapi-generator checkout not found"; exit 1 }
          $sharedSrc = Join-Path $checkout.FullName "Plugins/PluginsShared"
          foreach ($plugin in @("OpenAPIGenerator", "OpenAPIGeneratorCommand")) {
            $symlinkPath = Join-Path $checkout.FullName "Plugins/$plugin/PluginsShared"
            if (Test-Path $symlinkPath -PathType Leaf) {
              Write-Host "Replacing symlink: $symlinkPath"
              Remove-Item $symlinkPath
              Copy-Item $sharedSrc $symlinkPath -Recurse
            }
          }

      - name: Build
        run: swift build --verbose

      - name: Test
        run: swift test --verbose

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: kaiten-${{ matrix.name }}
          path: .build/debug/${{ matrix.bin-name }}
          retention-days: 1
